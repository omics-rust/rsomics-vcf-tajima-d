name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install vcftools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y vcftools
      - name: Install vcftools (macOS)
        if: runner.os == 'macOS'
        run: brew install vcftools
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
